<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KUET Tech Club</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">
      <h2>KUET <span>Tech Club ⚡</span></h2>
    </div>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="members.html">Members</a>
      <a href="events.html">Events</a>
      <a href="gallery.html">Gallery</a>
      <a href="register.html" class="btn">Join</a>

      <button class="theme-toggle">🌙</button>
    </nav>
  </header>

  <!-- FORM SECTION -->
  <section class="form-section">
    <div class="form-container">
      <h1>Join KUET Tech Club</h1>
      <p>Fill out the form to become a member</p>

      <form>

        <div class="input-group">
          <label>Full Name</label>
          <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="input-group">
          <label>Email</label>
          <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
          <label>Department</label>
          <input type="text" placeholder="e.g. CSE, EEE" required>
        </div>

        <div class="input-group">
          <label>Skills</label>
          <input type="text" placeholder="e.g. HTML, Python, Robotics">
        </div>

        <div class="input-group">
          <label>Why do you want to join?</label>
          <textarea rows="4" placeholder="Write your motivation..."></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit Application</button>

      </form>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 KUET Tech Club | Khulna University of Engineering & Technology</p>
  </footer>

</body>
</html>
